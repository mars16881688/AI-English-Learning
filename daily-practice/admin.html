<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
  :root{--bg:#f5f6f6;--surface:#fff;--border:#eaebec;--text:#1f2a32;--text2:#82888d;--accent:#00b8b8;--green:#00b99a;--red:#f7415f;--orange:#ff9728;--r:12px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

  .header{background:linear-gradient(135deg,#e6f9f9,#fff);border-bottom:1px solid var(--border);padding:24px 20px;text-align:center;}
  .header h1{font-size:20px;font-weight:700;}
  .header .sub{font-size:13px;color:var(--text2);margin-top:4px;}

  .container{max-width:800px;margin:0 auto;padding:20px 16px;}

  /* Login */
  .key-form{display:flex;gap:8px;margin-bottom:24px;}
  .key-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:14px;outline:none;}
  .key-input:focus{border-color:var(--accent);}
  .key-btn{padding:10px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
  .key-btn:hover{opacity:.9;}

  /* Stats row */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center;}
  .stat .num{font-size:28px;font-weight:800;line-height:1;}
  .stat .lbl{font-size:12px;color:var(--text2);margin-top:4px;}

  /* User table */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
  .table{width:100%;border-collapse:collapse;font-size:14px;}
  .table th{text-align:left;padding:12px 16px;background:rgba(0,0,0,.02);font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
  .table td{padding:12px 16px;border-bottom:1px solid var(--border);}
  .table tr:last-child td{border-bottom:none;}
  .table tr:hover td{background:rgba(0,184,184,.03);}
  .table .name{font-weight:700;color:var(--accent);cursor:pointer;}
  .table .name:hover{text-decoration:underline;}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;}
  .badge.active{background:rgba(0,185,154,.1);color:var(--green);}
  .badge.inactive{background:rgba(130,136,141,.1);color:var(--text2);}

  /* Detail panel */
  .detail{display:none;margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
  .detail.visible{display:block;animation:fadeIn .25s ease;}
  .detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .detail-header h2{font-size:18px;}
  .detail-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:20px;}
  .detail-close:hover{color:var(--red);}

  .detail-section{margin-bottom:16px;}
  .detail-section h3{font-size:13px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

  .checkin-grid{display:flex;flex-wrap:wrap;gap:4px;}
  .checkin-dot{width:14px;height:14px;border-radius:3px;background:var(--border);}
  .checkin-dot.checked{background:var(--green);}
  .checkin-dot.today{box-shadow:inset 0 0 0 2px var(--accent);}

  .score-list{display:flex;flex-direction:column;gap:6px;}
  .score-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:6px 10px;background:rgba(0,0,0,.02);border-radius:8px;}
  .score-row .sentence{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .score-row .pct{font-weight:700;min-width:40px;text-align:right;}
  .score-row .pct.good{color:var(--green);}
  .score-row .pct.fair{color:var(--orange);}
  .score-row .pct.poor{color:var(--red);}

  .word-list{display:flex;flex-wrap:wrap;gap:6px;}
  .word-chip{padding:4px 10px;border-radius:8px;font-size:13px;background:rgba(255,151,40,.08);color:var(--orange);border:1px solid rgba(255,151,40,.15);}

  .empty{color:var(--text2);font-size:13px;font-style:italic;}

  .action-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;font-size:12px;cursor:pointer;transition:all .15s;margin-right:4px;}
  .action-btn:hover{opacity:.8;}
  .action-btn.ban{color:var(--red);border-color:rgba(247,65,95,.3);}
  .action-btn.ban:hover{background:rgba(247,65,95,.06);}
  .action-btn.unban{color:var(--green);border-color:rgba(0,185,154,.3);}
  .action-btn.unban:hover{background:rgba(0,185,154,.06);}
  .action-btn.del{color:var(--red);border-color:rgba(247,65,95,.3);}
  .action-btn.del:hover{background:rgba(247,65,95,.1);}
  .badge.banned{background:rgba(247,65,95,.1);color:var(--red);}
  .invite-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .invite-chip{padding:6px 12px;border-radius:8px;font-size:13px;font-family:monospace;background:var(--surface);border:1px solid var(--border);}
  .invite-chip.used{color:var(--text2);text-decoration:line-through;opacity:.6;}
  .invite-chip.available{color:var(--accent);border-color:var(--accent);font-weight:600;cursor:pointer;}
  .invite-chip.available:hover{background:rgba(0,184,184,.06);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:480px){.stats{grid-template-columns:repeat(2,1fr);}.stat .num{font-size:22px;}}
</style>
</head>
<body>

<div class="header">
  <h1>Admin Dashboard</h1>
  <div class="sub">DailyDose</div>
</div>

<div class="container">
  <div class="key-form" id="key-form">
    <input class="key-input" id="key-input" type="password" placeholder="Enter admin key">
    <button class="key-btn" onclick="loadDashboard()">Load</button>
  </div>

  <div id="dashboard" style="display:none">
    <div class="stats" id="stats"></div>

    <!-- Invite codes -->
    <div id="invite-section" style="margin-bottom:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <h3 style="font-size:14px;color:var(--text2);">INVITE CODES</h3>
        <button onclick="generateInvites()" style="padding:6px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;">Generate 5 Codes</button>
      </div>
      <div id="invite-list"></div>
    </div>

    <div class="table-wrap"><table class="table" id="user-table">
      <thead><tr><th>User</th><th>Check-ins</th><th>Words</th><th>Scores</th><th>Last Active</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="user-tbody"></tbody>
    </table></div>
    <div class="detail" id="detail"></div>
  </div>
</div>

<script>
const API = 'https://speech.marswang.ac.cn';
let adminKey = localStorage.getItem('ep_admin_key') || '';
let usersData = [];

if (adminKey) {
  document.getElementById('key-input').value = '••••••••';
  loadDashboard();
}

document.getElementById('key-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadDashboard(); });

async function loadDashboard() {
  const input = document.getElementById('key-input');
  const raw = input.value.trim();
  if (raw && raw !== '••••••••') adminKey = raw;
  if (!adminKey) return;

  try {
    const resp = await fetch(`${API}/admin/users?key=${adminKey}`);
    if (!resp.ok) { alert('Invalid admin key'); return; }
    const result = await resp.json();
    usersData = result.users;
    localStorage.setItem('ep_admin_key', adminKey);
    input.value = '••••••••';
    render(result);
    document.getElementById('dashboard').style.display = 'block';
  } catch (e) { alert('Network error'); }
}

function render(result) {
  const users = result.users;
  const today = new Date().toISOString().slice(0, 10);

  // Stats
  const totalUsers = users.length;
  const activeToday = users.filter(u => u.lastCheckin === today).length;
  const totalWords = users.reduce((s, u) => s + u.wordCount, 0);
  const totalScores = users.reduce((s, u) => s + u.scoreCount, 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num" style="color:var(--accent)">${totalUsers}</div><div class="lbl">Total Users</div></div>
    <div class="stat"><div class="num" style="color:var(--green)">${activeToday}</div><div class="lbl">Active Today</div></div>
    <div class="stat"><div class="num" style="color:var(--orange)">${totalWords}</div><div class="lbl">Words Saved</div></div>
    <div class="stat"><div class="num" style="color:var(--accent)">${totalScores}</div><div class="lbl">Recordings</div></div>
  `;

  // Table
  const today2 = today;
  const tbody = document.getElementById('user-tbody');
  tbody.innerHTML = users.sort((a, b) => b.lastCheckin.localeCompare(a.lastCheckin)).map(u => {
    const isActive = u.lastCheckin === today2;
    const statusBadge = u.banned ? '<span class="badge banned">Banned</span>' : `<span class="badge ${isActive ? 'active' : 'inactive'}">${isActive ? 'Today' : 'Away'}</span>`;
    const actions = u.banned
      ? `<button class="action-btn unban" onclick="unbanUser('${u.name}')">Unban</button>`
      : `<button class="action-btn ban" onclick="banUser('${u.name}')">Ban</button>`;
    return `<tr style="${u.banned ? 'opacity:.5' : ''}">
      <td><span class="name" onclick="loadDetail('${u.name}')">${esc(u.name)}</span></td>
      <td>${u.checkinDays} days</td>
      <td>${u.wordCount}</td>
      <td>${u.scoreCount}</td>
      <td>${u.lastCheckin}</td>
      <td>${statusBadge}</td>
      <td>${actions}<button class="action-btn del" onclick="deleteUser('${u.name}')">Delete</button></td>
    </tr>`;
  }).join('');

  loadInvites();
}

async function loadDetail(name) {
  const resp = await fetch(`${API}/admin/user/${name}?key=${adminKey}`);
  if (!resp.ok) return;
  const result = await resp.json();
  renderDetail(result);
}

function renderDetail(result) {
  const el = document.getElementById('detail');
  const d = result.data || {};
  const checkins = d.checkins || {};
  const wordbook = d.wordbook || [];
  const scores = d.scores || {};

  // Checkin heatmap (last 30 days)
  let checkinHtml = '<div class="checkin-grid">';
  const today = new Date();
  for (let i = 29; i >= 0; i--) {
    const dt = new Date(today); dt.setDate(dt.getDate() - i);
    const key = dt.toISOString().slice(0, 10);
    const checked = checkins[key] ? 'checked' : '';
    const isToday = i === 0 ? 'today' : '';
    const title = key + (checkins[key] ? ' (' + checkins[key].join(', ') + ')' : '');
    checkinHtml += `<div class="checkin-dot ${checked} ${isToday}" title="${title}"></div>`;
  }
  checkinHtml += '</div>';

  // Scores
  let scoreHtml = '';
  const scoreEntries = Object.entries(scores);
  if (scoreEntries.length) {
    scoreHtml = '<div class="score-list">';
    scoreEntries.sort((a, b) => (b[1].date || '').localeCompare(a[1].date || '')).forEach(([key, s]) => {
      const pct = s.overall || s.pct || 0;
      const cls = pct >= 80 ? 'good' : pct >= 60 ? 'fair' : 'poor';
      scoreHtml += `<div class="score-row"><span class="sentence">${esc(key)}</span><span class="pct ${cls}">${pct}%</span></div>`;
    });
    scoreHtml += '</div>';
  } else {
    scoreHtml = '<div class="empty">No recordings yet</div>';
  }

  // Wordbook
  let wordHtml = '';
  if (wordbook.length) {
    wordHtml = '<div class="word-list">';
    wordbook.forEach(w => { wordHtml += `<div class="word-chip">${esc(w.word)}${w.meaning ? ' · ' + esc(w.meaning) : ''}</div>`; });
    wordHtml += '</div>';
  } else {
    wordHtml = '<div class="empty">No words saved</div>';
  }

  el.innerHTML = `
    <div class="detail-header">
      <h2>${esc(result.name)}</h2>
      <button class="detail-close" onclick="document.getElementById('detail').classList.remove('visible')">&times;</button>
    </div>
    <div class="detail-section">
      <h3>Check-ins (last 30 days)</h3>
      ${checkinHtml}
    </div>
    <div class="detail-section">
      <h3>Pronunciation Scores (${scoreEntries.length})</h3>
      ${scoreHtml}
    </div>
    <div class="detail-section">
      <h3>Wordbook (${wordbook.length})</h3>
      ${wordHtml}
    </div>
  `;
  el.classList.add('visible');
  el.scrollIntoView({ behavior: 'smooth' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function banUser(name) {
  if (!confirm(`Ban "${name}"? They will lose access to TTS and sync.`)) return;
  await fetch(`${API}/admin/ban?key=${adminKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  loadDashboard();
}
async function unbanUser(name) {
  await fetch(`${API}/admin/unban?key=${adminKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  loadDashboard();
}
async function deleteUser(name) {
  if (!confirm(`Permanently delete "${name}" and all their data?`)) return;
  await fetch(`${API}/admin/delete?key=${adminKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
  loadDashboard();
}
async function generateInvites() {
  const resp = await fetch(`${API}/admin/invite?key=${adminKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ count: 5 }) });
  const result = await resp.json();
  loadInvites();
}
async function loadInvites() {
  const resp = await fetch(`${API}/admin/invites?key=${adminKey}`);
  if (!resp.ok) return;
  const result = await resp.json();
  const el = document.getElementById('invite-list');
  if (!result.invites.length) { el.innerHTML = '<div style="font-size:13px;color:var(--text2)">No invite codes yet. Generate some to let people register.</div>'; return; }
  const available = result.invites.filter(i => !i.used);
  const used = result.invites.filter(i => i.used);
  el.innerHTML = `<div class="invite-grid">${available.map(i => `<span class="invite-chip available" onclick="navigator.clipboard.writeText('${i.code}');this.textContent='Copied!';setTimeout(()=>{this.textContent='${i.code}'},1000)" title="Click to copy">${i.code}</span>`).join('')}${used.map(i => `<span class="invite-chip used" title="Used by ${i.usedBy || '?'}">${i.code}</span>`).join('')}</div>`;
}
</script>
</body>
</html>
