<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English Practice</title>
<style>
  :root {
    --bg: #f5f6f6;
    --surface: #ffffff;
    --border: #eaebec;
    --text: #1f2a32;
    --text-secondary: #82888d;
    --accent: #00b8b8;
    --accent-hover: #00a3a3;
    --accent-light: rgba(0,184,184,0.1);
    --green: #00b99a;
    --red: #f7415f;
    --orange: #ff9728;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7;
    min-height: 100vh; padding-bottom: 70px;
  }

  /* ── Nav ── */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.96); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); display: flex; z-index: 200;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 8px 0 6px; cursor: pointer; color: var(--text-secondary);
    font-size: 11px; gap: 2px; border: none; background: none;
    -webkit-tap-highlight-color: transparent; transition: color 0.15s;
  }
  .nav-item:hover, .nav-item.active { color: var(--accent); }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-badge {
    position: absolute; top: 4px; right: calc(50% - 18px);
    background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
    min-width: 16px; height: 16px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; padding: 0 4px;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #e6f9f9, #ffffff);
    border-bottom: 1px solid var(--border); padding: 28px 20px 24px; text-align: center;
  }
  .header-inner { position: relative; }
  .header-back {
    position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    color: var(--accent); background: none; border: none; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; gap: 4px;
  }
  .header-back svg { width: 18px; height: 18px; }
  .header .date-label {
    font-size: 13px; color: var(--text-secondary);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .theme-tag {
    display: inline-block; background: var(--accent-light); color: var(--accent);
    padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 500;
  }
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

  /* ── Theme picker ── */
  .theme-picker { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
  .theme-chip {
    padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text-secondary);
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .theme-chip:hover { border-color: var(--accent); color: var(--accent); }
  .theme-chip.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }

  /* ── Streak ── */
  .streak-bar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 20px;
  }
  .streak-num { font-size: 36px; font-weight: 800; color: var(--orange); line-height: 1; }
  .streak-text { font-size: 13px; color: var(--text-secondary); }

  /* ── Calendar ── */
  .cal-month-title { font-size: 15px; font-weight: 600; margin: 20px 0 10px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; margin-bottom: 8px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--text-secondary); padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: 14px;
    color: var(--text-secondary); border: 1px solid transparent; cursor: default; position: relative;
  }
  .cal-day.empty { visibility: hidden; }
  .cal-day.has-lesson { cursor: pointer; color: var(--text); border-color: var(--border); background: var(--surface); }
  .cal-day.has-lesson:hover { border-color: var(--accent); }
  .cal-day.checked { background: rgba(0,185,154,0.1); border-color: var(--green); color: var(--green); font-weight: 700; }
  .cal-day.today { box-shadow: inset 0 0 0 2px var(--accent); }
  .cal-day .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); position: absolute; bottom: 4px; }
  .cal-checkin-times {
    font-size: 12px; color: var(--text-secondary); margin-top: 12px;
    padding: 10px 14px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  }
  .cal-checkin-times h4 { font-size: 13px; color: var(--text); margin-bottom: 6px; }

  /* ── Section title ── */
  .section-title {
    font-size: 14px; font-weight: 600; color: var(--text-secondary);
    letter-spacing: 1.5px; text-transform: uppercase; margin: 28px 0 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Cards ── */
  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; margin-bottom: 14px; transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--accent); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .card-num { font-size: 12px; font-weight: 700; color: var(--accent); background: var(--accent-light); padding: 2px 10px; border-radius: 10px; }
  .btn-group { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn svg { width: 16px; height: 16px; }
  .icon-btn.playing { border-color: var(--green); color: var(--green); animation: pulse 1.5s infinite; }
  .icon-btn.rec { color: var(--red); }
  .icon-btn.rec:hover { border-color: var(--red); background: rgba(247,65,95,0.06); color: var(--red); }
  .icon-btn.rec.recording { border-color: var(--red); background: rgba(247,65,95,0.1); animation: rec-pulse 1s infinite; }

  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,185,154,0.25); } 50% { box-shadow: 0 0 0 6px rgba(0,185,154,0); } }
  @keyframes rec-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(247,65,95,0.3); } 50% { box-shadow: 0 0 0 8px rgba(247,65,95,0); } }

  .sentence-en { font-size: 17px; font-weight: 500; line-height: 1.6; margin-bottom: 8px; }
  .sentence-zh { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

  /* ── Score ── */
  .score-result { display: none; margin-top: 14px; padding: 14px; border-radius: 10px; background: rgba(0,0,0,0.02); border: 1px solid var(--border); }
  .score-result.visible { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .score-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .score-badge { font-size: 28px; font-weight: 800; line-height: 1; }
  .score-badge.excellent { color: var(--green); }
  .score-badge.good { color: var(--accent); }
  .score-badge.fair { color: var(--orange); }
  .score-badge.poor { color: var(--red); }
  .score-label { font-size: 12px; color: var(--text-secondary); padding: 3px 10px; border-radius: 8px; background: rgba(0,0,0,0.04); }
  .score-words { font-size: 15px; line-height: 1.8; word-spacing: 2px; }
  .score-words .matched { color: var(--green); font-weight: 500; }
  .score-words .missed { color: var(--red); text-decoration: underline wavy; text-underline-offset: 3px; opacity: 0.8; }
  .score-your-text { margin-top: 8px; font-size: 13px; color: var(--text-secondary); font-style: italic; }
  .score-your-text::before { content: 'You said: '; font-style: normal; font-weight: 500; }
  .rec-hint { display: none; text-align: center; font-size: 12px; color: var(--red); margin-top: 8px; }
  .rec-hint.visible { display: block; animation: fadeIn 0.2s ease; }

  /* ── Vocab ── */
  .vocab-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
  .vocab-card:hover { border-color: var(--orange); }
  .vocab-word { font-size: 20px; font-weight: 700; margin-right: 8px; }
  .vocab-phonetic { font-size: 14px; color: var(--text-secondary); font-family: 'Lucida Sans Unicode', sans-serif; }
  .vocab-meaning { display: inline-block; background: rgba(255,151,40,0.1); color: var(--orange); padding: 2px 10px; border-radius: 8px; font-size: 13px; font-weight: 500; margin-left: 8px; }
  .vocab-header { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .vocab-example { background: rgba(0,0,0,0.02); border-left: 3px solid var(--border); padding: 10px 14px; border-radius: 0 8px 8px 0; margin-top: 10px; }
  .vocab-example .en { font-size: 14px; line-height: 1.6; }
  .vocab-example .zh { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  /* ── Star / Wordbook ── */
  .star-btn {
    width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; margin-left: auto;
  }
  .star-btn:hover { border-color: var(--orange); color: var(--orange); }
  .star-btn.saved { border-color: var(--orange); color: var(--orange); background: rgba(255,151,40,0.08); }
  .star-btn svg { width: 16px; height: 16px; }

  .wb-empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .wb-empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
  .wb-count { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
  .wb-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 12px; }
  .wb-card:hover { border-color: var(--orange); }
  .wb-card-body { flex: 1; min-width: 0; }
  .wb-card-word { font-size: 17px; font-weight: 700; }
  .wb-card-phonetic { font-size: 13px; color: var(--text-secondary); margin-left: 8px; }
  .wb-card-meaning { font-size: 13px; color: var(--orange); margin-top: 2px; }
  .wb-card-source { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
  .wb-remove { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px; border-radius: 6px; flex-shrink: 0; }
  .wb-remove:hover { color: var(--red); background: rgba(247,65,95,0.06); }
  .wb-remove svg { width: 16px; height: 16px; }

  .wb-add-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .wb-add-input {
    flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  .wb-add-input::placeholder { color: var(--text-secondary); }
  .wb-add-input:focus { border-color: var(--accent); }
  .wb-add-btn {
    padding: 10px 18px; border-radius: 10px; border: none; background: var(--accent);
    color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .wb-add-btn:hover { background: var(--accent-hover); }

  /* ── Speed ── */
  .speed-control { display: flex; align-items: center; gap: 8px; justify-content: center; margin: 16px 0 0; padding: 10px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
  .speed-control label { font-size: 13px; color: var(--text-secondary); }
  .speed-btn { padding: 4px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .speed-btn:hover { border-color: var(--accent); color: var(--accent); }
  .speed-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .highlight { background: var(--accent-light); border-color: var(--accent) !important; }
  .no-speech-banner { display: none; background: rgba(247,65,95,0.06); border: 1px solid rgba(247,65,95,0.2); border-radius: var(--radius); padding: 12px 16px; margin-top: 12px; font-size: 13px; color: var(--red); text-align: center; }
  .no-speech-banner.visible { display: block; }

  .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 14px; }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.25s ease; }

  @media (max-width: 480px) {
    .header { padding: 24px 16px 20px; }
    .header h1 { font-size: 19px; }
    .sentence-en { font-size: 16px; }
    .container { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="page" id="page-calendar">
  <div class="header"><div class="header-inner">
    <h1>Daily English Practice</h1>
    <div class="date-label" id="cal-today-label"></div>
  </div></div>
  <div class="container" id="cal-content"></div>
</div>

<div class="page" id="page-lesson">
  <div class="header"><div class="header-inner">
    <button class="header-back" onclick="navigate('calendar')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="date-label" id="lesson-date"></div>
    <h1>Daily English Practice</h1>
    <span class="theme-tag" id="lesson-theme"></span>
  </div></div>
  <div class="container" id="lesson-content"></div>
</div>

<div class="page" id="page-wordbook">
  <div class="header"><div class="header-inner">
    <h1>Wordbook</h1>
    <div class="date-label">My Saved Words</div>
  </div></div>
  <div class="container" id="wb-content"></div>
</div>

<nav class="nav">
  <button class="nav-item" onclick="navigate('calendar')" id="nav-calendar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Calendar
  </button>
  <button class="nav-item" onclick="navigateToday()" id="nav-today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
    Today
  </button>
  <button class="nav-item" onclick="navigate('wordbook')" id="nav-wordbook" style="position:relative">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    <span id="wb-badge-count"></span>
    Wordbook
  </button>
</nav>

<script>
// ══════ CONFIG ══════
const DATA_BASE = './data';
const STORE_CHECKINS = 'ep_checkins';
const STORE_WORDBOOK = 'ep_wordbook';
const STORE_THEME = 'ep_theme';

// ══════ STATE ══════
let dataIndex = null; // {dates:[], themes:{}}
let lessonCache = {}; // dateStr -> lesson data
let currentTheme = localStorage.getItem(STORE_THEME) || 'growth';
let currentRate = 0.85;
let currentUtterance = null;
let currentBtn = null;
let activeRecognition = null;
let activeRecBtn = null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSR = !!SpeechRecognition;

// ══════ DATA FETCHING ══════
async function loadIndex() {
  if (dataIndex) return dataIndex;
  const r = await fetch(DATA_BASE + '/index.json?t=' + Date.now());
  dataIndex = await r.json();
  return dataIndex;
}
async function loadLesson(dateStr) {
  if (lessonCache[dateStr]) return lessonCache[dateStr];
  const r = await fetch(DATA_BASE + '/' + dateStr + '.json?t=' + Date.now());
  if (!r.ok) return null;
  const data = await r.json();
  lessonCache[dateStr] = data;
  return data;
}

// ══════ STORAGE ══════
function getCheckins() { try { return JSON.parse(localStorage.getItem(STORE_CHECKINS)) || {}; } catch { return {}; } }
function addCheckin(date) {
  const all = getCheckins(); const times = all[date] || [];
  const now = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  if (times[times.length - 1] !== now) times.push(now);
  all[date] = times; localStorage.setItem(STORE_CHECKINS, JSON.stringify(all));
}
function getStreak() {
  const c = getCheckins(); const today = new Date(); let s = 0;
  for (let i = 0; i < 365; i++) { const d = new Date(today); d.setDate(d.getDate()-i); if (c[fmtDate(d)]) s++; else if (i>0) break; }
  return s;
}
function getWordbook() { try { return JSON.parse(localStorage.getItem(STORE_WORDBOOK)) || []; } catch { return []; } }
function saveWordbook(wb) { localStorage.setItem(STORE_WORDBOOK, JSON.stringify(wb)); }
function isInWordbook(w) { return getWordbook().some(x => x.word.toLowerCase() === w.toLowerCase()); }
function addToWordbook(w, ph, m, src) { const wb = getWordbook(); if (wb.some(x=>x.word.toLowerCase()===w.toLowerCase())) return; wb.push({word:w,phonetic:ph,meaning:m,source:src,addedAt:new Date().toISOString()}); saveWordbook(wb); updateWbBadge(); }
function removeFromWordbook(w) { saveWordbook(getWordbook().filter(x=>x.word.toLowerCase()!==w.toLowerCase())); updateWbBadge(); }
function updateWbBadge() { const c=getWordbook().length; const el=document.getElementById('wb-badge-count'); if(c>0){el.className='nav-badge';el.textContent=c;}else{el.className='';el.textContent='';} }

// ══════ UTILS ══════
function fmtDate(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr() { return fmtDate(new Date()); }
function fmtDateDisplay(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ══════ ROUTING ══════
function navigate(page, arg) {
  if (page==='calendar') location.hash='#/';
  else if (page==='lesson') location.hash='#/'+arg;
  else if (page==='wordbook') location.hash='#/wordbook';
}
async function navigateToday() {
  const idx = await loadIndex();
  const today = todayStr();
  if (idx.dates.includes(today)) navigate('lesson', today);
  else if (idx.dates.length) navigate('lesson', idx.dates[idx.dates.length-1]);
  else navigate('calendar');
}
async function handleRoute() {
  const hash = location.hash.replace('#/','').replace('#','');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if (hash==='wordbook') {
    document.getElementById('page-wordbook').classList.add('active');
    document.getElementById('nav-wordbook').classList.add('active');
    renderWordbook();
  } else if (hash && hash.match(/^\d{4}-\d{2}-\d{2}$/)) {
    document.getElementById('page-lesson').classList.add('active');
    document.getElementById('nav-today').classList.add('active');
    await renderLesson(hash);
    addCheckin(hash);
  } else {
    document.getElementById('page-calendar').classList.add('active');
    document.getElementById('nav-calendar').classList.add('active');
    await renderCalendar();
  }
  updateWbBadge();
}
window.addEventListener('hashchange', handleRoute);

// ══════ RENDER: Calendar ══════
async function renderCalendar() {
  const idx = await loadIndex();
  const today = new Date();
  document.getElementById('cal-today-label').textContent = fmtDateDisplay(todayStr());
  const checkins = getCheckins();
  const streak = getStreak();
  const dateSet = new Set(idx.dates);
  const months = [];
  for (let i=1;i>=0;i--) { const d=new Date(today.getFullYear(),today.getMonth()-i,1); months.push({year:d.getFullYear(),month:d.getMonth()}); }

  let h = `<div class="streak-bar"><span style="font-size:28px">&#x1F525;</span><div><div class="streak-num">${streak}</div><div class="streak-text">day streak</div></div></div>`;
  const tc = checkins[todayStr()];
  if (tc && tc.length) h += `<div class="cal-checkin-times"><h4>Today's check-ins</h4>${tc.map(t=>'<span style="margin-right:12px">'+t+'</span>').join('')}</div>`;

  for (const {year,month} of months) {
    const fd=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate();
    h += `<div class="cal-month-title">${MONTHS[month]} ${year}</div><div class="cal-grid">`;
    for (const d of DOW) h+=`<div class="cal-dow">${d}</div>`;
    for (let i=0;i<fd;i++) h+='<div class="cal-day empty"></div>';
    for (let d=1;d<=dim;d++) {
      const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const has=dateSet.has(ds), ck=!!checkins[ds], it=ds===todayStr();
      const cls=['cal-day']; if(has)cls.push('has-lesson'); if(ck)cls.push('checked'); if(it)cls.push('today');
      const oc=has?` onclick="navigate('lesson','${ds}')"`:'';
      h+=`<div class="${cls.join(' ')}"${oc}>${d}${ck?'<span class="dot"></span>':''}</div>`;
    }
    h+='</div>';
  }
  document.getElementById('cal-content').innerHTML = h;
}

// ══════ RENDER: Lesson ══════
async function renderLesson(dateStr) {
  const el = document.getElementById('lesson-content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  const lesson = await loadLesson(dateStr);
  if (!lesson) { el.innerHTML = '<div class="loading">No lesson for this date.</div>'; return; }

  document.getElementById('lesson-date').textContent = fmtDateDisplay(dateStr);
  const themes = lesson.themes;
  const themeKeys = Object.keys(themes);
  if (!themes[currentTheme]) currentTheme = themeKeys[0];
  const theme = themes[currentTheme];
  document.getElementById('lesson-theme').textContent = theme.label;

  // Check-in times
  const checkins = getCheckins();
  const times = checkins[dateStr] || [];

  let h = '';
  if (times.length) h += `<div class="cal-checkin-times"><h4>Check-in times</h4>${times.map(t=>'<span style="margin-right:12px">'+t+'</span>').join('')}</div>`;

  // Theme picker
  h += '<div class="theme-picker">';
  for (const k of themeKeys) {
    const active = k === currentTheme ? ' active' : '';
    h += `<button class="theme-chip${active}" onclick="switchTheme('${k}','${dateStr}')">${escHtml(themes[k].label)}</button>`;
  }
  h += '</div>';

  // Speed
  h += `<div class="speed-control"><label>Speed</label>
    <button class="speed-btn" data-speed="0.7">0.7x</button>
    <button class="speed-btn active" data-speed="0.85">0.85x</button>
    <button class="speed-btn" data-speed="1">1x</button>
    <button class="speed-btn" data-speed="1.2">1.2x</button></div>`;
  if (!hasSR) h += '<div class="no-speech-banner visible">Speech Recognition not supported. Use Chrome.</div>';

  // Sentences
  h += '<div class="section-title">Sentences</div>';
  theme.sentences.forEach((s,i) => {
    const tts = s.en.replace(/Let's/g,'Let us');
    h += `<div class="card" data-text="${escHtml(s.en)}">
      <div class="card-header"><span class="card-num">#${i+1}</span><div class="btn-group">
        <button class="icon-btn" onclick="speak('${escJs(tts)}',this)"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg></button>
        ${hasSR?'<button class="icon-btn rec" onclick="toggleRecord(this)"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="7"/></svg></button>':''}
      </div></div>
      <div class="sentence-en">${escHtml(s.en)}</div><div class="sentence-zh">${escHtml(s.zh)}</div>
      <div class="rec-hint">Listening...</div><div class="score-result"></div></div>`;
  });

  // Vocabulary
  h += '<div class="section-title">Vocabulary</div>';
  theme.vocabulary.forEach(v => {
    const saved = isInWordbook(v.word);
    h += `<div class="vocab-card"><div class="vocab-header">
      <span class="vocab-word">${escHtml(v.word)}</span>
      <span class="vocab-phonetic">${escHtml(v.phonetic)}</span>
      <span class="vocab-meaning">${escHtml(v.meaning)}</span>
      <button class="icon-btn" onclick="speak('${escJs(v.word)}',this)" style="margin-left:auto"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg></button>
      <button class="star-btn ${saved?'saved':''}" onclick="toggleStar(this,'${escJs(v.word)}','${escJs(v.phonetic)}','${escJs(v.meaning)}','${escJs(dateStr)}')">
        <svg viewBox="0 0 24 24" fill="${saved?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    </div>
    <div class="vocab-example"><div class="en">${escHtml(v.example.en)}</div><div class="zh">${escHtml(v.example.zh)}</div></div></div>`;
  });

  el.innerHTML = h;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => { document.querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentRate=parseFloat(btn.dataset.speed); });
  });
}

function switchTheme(key, dateStr) {
  currentTheme = key;
  localStorage.setItem(STORE_THEME, key);
  renderLesson(dateStr);
}

// ══════ RENDER: Wordbook ══════
function renderWordbook() {
  const wb = getWordbook();
  let h = `<div class="wb-add-form"><input class="wb-add-input" id="wb-word-input" type="text" placeholder="Type a word, e.g. funnel" autocomplete="off" autocapitalize="none" spellcheck="false"><button class="wb-add-btn" onclick="handleAddWord()">Add</button></div>`;
  if (!wb.length) {
    h += `<div class="wb-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><div style="font-size:16px;font-weight:600;margin-bottom:6px">Wordbook is empty</div><div>Type a word above or tap the star in lessons.</div></div>`;
  } else {
    h += `<div class="wb-count">${wb.length} word${wb.length>1?'s':''} saved</div>`;
    [...wb].sort((a,b)=>b.addedAt.localeCompare(a.addedAt)).forEach(w => {
      h += `<div class="wb-card">
        <button class="icon-btn" onclick="speak('${escJs(w.word)}',this)" style="width:32px;height:32px"><svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><polygon points="6,3 20,12 6,21"/></svg></button>
        <div class="wb-card-body"><div><span class="wb-card-word">${escHtml(w.word)}</span><span class="wb-card-phonetic">${escHtml(w.phonetic||'')}</span></div>
        ${w.meaning?`<div class="wb-card-meaning">${escHtml(w.meaning)}</div>`:''}
        <div class="wb-card-source">Added ${new Date(w.addedAt).toLocaleDateString('zh-CN')}${w.source?' from '+w.source:''}</div></div>
        <button class="wb-remove" onclick="removeWord('${escJs(w.word)}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`;
    });
  }
  document.getElementById('wb-content').innerHTML = h;
  const inp = document.getElementById('wb-word-input');
  if (inp) { inp.addEventListener('keydown', e => { if(e.key==='Enter') handleAddWord(); }); inp.focus(); }
}
function handleAddWord() {
  const inp=document.getElementById('wb-word-input'); const raw=(inp.value||'').trim(); if(!raw) return;
  let word=raw,phonetic='',meaning='';
  const pm=raw.match(/^(.+?)\s+(\/[^/]+\/)\s*(.*)$/);
  if(pm){word=pm[1].trim();phonetic=pm[2].trim();meaning=pm[3].trim();}
  else{const dm=raw.match(/^(.+?)\s*[-=]\s+(.+)$/);if(dm){word=dm[1].trim();meaning=dm[2].trim();}}
  if(isInWordbook(word)){inp.value='';inp.placeholder='Already saved!';setTimeout(()=>{inp.placeholder="Type a word, e.g. funnel";},1500);return;}
  addToWordbook(word,phonetic,meaning,'manual'); renderWordbook();
}
function toggleStar(btn,w,ph,m,src) { if(isInWordbook(w)){removeFromWordbook(w);btn.classList.remove('saved');btn.querySelector('svg').setAttribute('fill','none');}else{addToWordbook(w,ph,m,src);btn.classList.add('saved');btn.querySelector('svg').setAttribute('fill','currentColor');} }
function removeWord(w) { removeFromWordbook(w); renderWordbook(); }

// ══════ TTS ══════
function speak(text, btn) {
  if(currentUtterance&&speechSynthesis.speaking){speechSynthesis.cancel();if(currentBtn){currentBtn.classList.remove('playing');currentBtn.closest('.card,.vocab-card')?.classList.remove('highlight');}if(currentBtn===btn){currentBtn=null;currentUtterance=null;return;}}
  const u=new SpeechSynthesisUtterance(text); u.lang='en-US'; u.rate=currentRate;
  const v=speechSynthesis.getVoices(); const p=v.find(x=>x.name.includes('Samantha'))||v.find(x=>x.lang==='en-US'&&x.localService)||v.find(x=>x.lang.startsWith('en'));
  if(p)u.voice=p; currentUtterance=u; currentBtn=btn;
  btn.classList.add('playing'); btn.closest('.card,.vocab-card')?.classList.add('highlight');
  u.onend=u.onerror=()=>{btn.classList.remove('playing');btn.closest('.card,.vocab-card')?.classList.remove('highlight');currentBtn=null;currentUtterance=null;};
  speechSynthesis.speak(u);
}

// ══════ SPEECH RECOGNITION ══════
function normalize(t){return t.toLowerCase().replace(/['']/g,"'").replace(/let's/g,'lets').replace(/[^\w\s']/g,'').trim().split(/\s+/);}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>new Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);return d[m][n];}
function scoreMatch(ref,spoken){const rw=normalize(ref),sw=normalize(spoken),used=new Array(sw.length).fill(false),res=[];let m=0;for(const r of rw){let f=false;for(let i=0;i<sw.length;i++){if(!used[i]&&sw[i]===r){used[i]=true;f=true;break;}}if(!f)for(let i=0;i<sw.length;i++){if(!used[i]&&r.length>3&&lev(sw[i],r)<=1){used[i]=true;f=true;break;}}res.push({word:r,matched:f});if(f)m++;}return{results:res,pct:Math.round(m/rw.length*100),matched:m,total:rw.length,spoken};}
function renderScore(card,r){const el=card.querySelector('.score-result');let g,gc;if(r.pct>=90){g='Excellent';gc='excellent';}else if(r.pct>=70){g='Good';gc='good';}else if(r.pct>=50){g='Fair';gc='fair';}else{g='Keep Trying';gc='poor';}el.innerHTML=`<div class="score-header"><span class="score-badge ${gc}">${r.pct}%</span><span class="score-label">${g} (${r.matched}/${r.total})</span></div><div class="score-words">${r.results.map(x=>`<span class="${x.matched?'matched':'missed'}">${x.word}</span>`).join(' ')}</div><div class="score-your-text">${escHtml(r.spoken)}</div>`;el.classList.add('visible');}
function toggleRecord(btn){if(!SpeechRecognition)return;const card=btn.closest('.card'),hint=card.querySelector('.rec-hint'),ref=card.dataset.text;if(speechSynthesis.speaking){speechSynthesis.cancel();if(currentBtn){currentBtn.classList.remove('playing');currentBtn.closest('.card,.vocab-card')?.classList.remove('highlight');}}if(activeRecognition&&activeRecBtn===btn){activeRecognition.stop();return;}if(activeRecognition)activeRecognition.stop();const rec=new SpeechRecognition();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.continuous=false;activeRecognition=rec;activeRecBtn=btn;btn.classList.add('recording');hint.classList.add('visible');card.querySelector('.score-result').classList.remove('visible');rec.onresult=e=>{renderScore(card,scoreMatch(ref,e.results[0][0].transcript));};rec.onerror=e=>{if(e.error!=='no-speech'&&e.error!=='aborted'){const el=card.querySelector('.score-result');el.innerHTML=`<div style="color:var(--red);font-size:13px">Error: ${e.error}</div>`;el.classList.add('visible');}};rec.onend=()=>{btn.classList.remove('recording');hint.classList.remove('visible');if(activeRecBtn===btn){activeRecognition=null;activeRecBtn=null;}};rec.start();}

// ══════ INIT ══════
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
updateWbBadge();
(async()=>{
  await loadIndex();
  if(!location.hash||location.hash==='#/'||location.hash==='#') await navigateToday();
  else await handleRoute();
})();
</script>
