<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily English Practice</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  :root {
    --bg: #f5f6f6; --surface: #ffffff; --border: #eaebec;
    --text: #1f2a32; --text-secondary: #82888d;
    --accent: #00b8b8; --accent-hover: #00a3a3; --accent-light: rgba(0,184,184,0.1);
    --green: #00b99a; --red: #f7415f; --orange: #ff9728; --radius: 12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','SF Pro Text',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh;padding-bottom:70px;}

  /* Nav */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,0.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:200;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;color:var(--text-secondary);font-size:11px;gap:2px;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:color .15s;position:relative;}
  .nav-item:hover,.nav-item.active{color:var(--accent);}
  .nav-item svg{width:22px;height:22px;}
  .nav-badge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

  /* Header */
  .header{background:linear-gradient(135deg,#e6f9f9,#ffffff);border-bottom:1px solid var(--border);padding:28px 20px 24px;text-align:center;}
  .header-inner{position:relative;}
  .header-back{position:absolute;left:0;top:50%;transform:translateY(-50%);color:var(--accent);background:none;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:4px;}
  .header-back svg{width:18px;height:18px;}
  .header .date-label{font-size:13px;color:var(--text-secondary);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .header h1{font-size:22px;font-weight:700;margin-bottom:6px;}
  .theme-tag{display:inline-block;background:var(--accent-light);color:var(--accent);padding:4px 14px;border-radius:20px;font-size:13px;font-weight:500;}
  .container{max-width:680px;margin:0 auto;padding:20px 16px;}

  /* Theme picker */
  .theme-picker{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;}
  .theme-chip{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
  .theme-chip:hover{border-color:var(--accent);color:var(--accent);}
  .theme-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* Streak */
  .streak-bar{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;}
  .streak-num{font-size:36px;font-weight:800;color:var(--orange);line-height:1;}
  .streak-text{font-size:13px;color:var(--text-secondary);}

  /* Calendar */
  .cal-month-title{font-size:15px;font-weight:600;margin:20px 0 10px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--text-secondary);padding:4px 0;}
  .cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;color:var(--text-secondary);border:1px solid transparent;cursor:default;position:relative;}
  .cal-day.empty{visibility:hidden;}
  .cal-day.has-lesson{cursor:pointer;color:var(--text);border-color:var(--border);background:var(--surface);}
  .cal-day.has-lesson:hover{border-color:var(--accent);}
  .cal-day.checked{background:rgba(0,185,154,0.1);border-color:var(--green);color:var(--green);font-weight:700;}
  .cal-day.today{box-shadow:inset 0 0 0 2px var(--accent);}
  .cal-day .dot{width:4px;height:4px;border-radius:50%;background:var(--green);position:absolute;bottom:4px;}

  /* Section */
  .section-title{font-size:14px;font-weight:600;color:var(--text-secondary);letter-spacing:1.5px;text-transform:uppercase;margin:28px 0 14px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;transition:border-color .2s;}
  .card:hover{border-color:var(--accent);}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .card-num{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:2px 10px;border-radius:10px;}
  .btn-group{display:flex;gap:8px;align-items:center;}
  .icon-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn svg{width:16px;height:16px;}
  .icon-btn.playing{border-color:var(--green);color:var(--green);animation:pulse 1.5s infinite;}
  .icon-btn.rec{color:var(--red);}
  .icon-btn.rec:hover{border-color:var(--red);background:rgba(247,65,95,0.06);color:var(--red);}
  .icon-btn.rec.recording{border-color:var(--red);background:rgba(247,65,95,0.1);animation:rec-pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,185,154,.25);}50%{box-shadow:0 0 0 6px rgba(0,185,154,0);}}
  @keyframes rec-pulse{0%,100%{box-shadow:0 0 0 0 rgba(247,65,95,.3);}50%{box-shadow:0 0 0 8px rgba(247,65,95,0);}}

  .sentence-en{font-size:17px;font-weight:500;line-height:1.6;margin-bottom:8px;}
  .sentence-zh{font-size:14px;color:var(--text-secondary);line-height:1.6;}

  /* Score */
  .score-result{display:none;margin-top:14px;padding:14px;border-radius:10px;background:rgba(0,0,0,.02);border:1px solid var(--border);}
  .score-result.visible{display:block;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .score-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .score-badge{font-size:28px;font-weight:800;line-height:1;}
  .score-badge.excellent{color:var(--green);}.score-badge.good{color:var(--accent);}.score-badge.fair{color:var(--orange);}.score-badge.poor{color:var(--red);}
  .score-label{font-size:12px;color:var(--text-secondary);padding:3px 10px;border-radius:8px;background:rgba(0,0,0,.04);}
  .score-words{font-size:15px;line-height:1.8;word-spacing:2px;}
  .score-words .matched{color:var(--green);font-weight:500;}.score-words .missed{color:var(--red);text-decoration:underline wavy;text-underline-offset:3px;opacity:.8;}
  .score-your-text{margin-top:8px;font-size:13px;color:var(--text-secondary);font-style:italic;}
  .score-your-text::before{content:'You said: ';font-style:normal;font-weight:500;}
  .rec-hint{display:none;text-align:center;font-size:12px;color:var(--red);margin-top:8px;}
  .rec-hint.visible{display:block;animation:fadeIn .2s ease;}

  /* Azure score detail */
  .az-score{margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .az-score-item{text-align:center;padding:8px;border-radius:8px;background:rgba(0,0,0,.02);border:1px solid var(--border);}
  .az-score-item .num{font-size:22px;font-weight:800;line-height:1;}
  .az-score-item .lbl{font-size:11px;color:var(--text-secondary);margin-top:2px;}
  .az-word-scores{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
  .az-word{padding:3px 8px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid var(--border);}
  .az-word.good{background:rgba(0,185,154,.08);border-color:var(--green);color:var(--green);}
  .az-word.fair{background:rgba(255,151,40,.08);border-color:var(--orange);color:var(--orange);}
  .az-word.poor{background:rgba(247,65,95,.06);border-color:var(--red);color:var(--red);}

  /* Vocab */
  .vocab-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
  .vocab-card:hover{border-color:var(--orange);}
  .vocab-word{font-size:20px;font-weight:700;margin-right:8px;}
  .vocab-phonetic{font-size:14px;color:var(--text-secondary);font-family:'Lucida Sans Unicode',sans-serif;}
  .vocab-meaning{display:inline-block;background:rgba(255,151,40,.1);color:var(--orange);padding:2px 10px;border-radius:8px;font-size:13px;font-weight:500;margin-left:8px;}
  .vocab-header{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
  .vocab-example{background:rgba(0,0,0,.02);border-left:3px solid var(--border);padding:10px 14px;border-radius:0 8px 8px 0;margin-top:10px;}
  .vocab-example .en{font-size:14px;line-height:1.6;}.vocab-example .zh{font-size:13px;color:var(--text-secondary);margin-top:4px;}

  /* Star */
  .star-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-left:auto;}
  .star-btn:hover{border-color:var(--orange);color:var(--orange);}
  .star-btn.saved{border-color:var(--orange);color:var(--orange);background:rgba(255,151,40,.08);}
  .star-btn svg{width:16px;height:16px;}

  /* Wordbook */
  .wb-empty{text-align:center;padding:60px 20px;color:var(--text-secondary);}
  .wb-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.4;}
  .wb-count{font-size:13px;color:var(--text-secondary);margin-bottom:16px;}
  .wb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px;}
  .wb-card:hover{border-color:var(--orange);}
  .wb-card-body{flex:1;min-width:0;}
  .wb-card-word{font-size:17px;font-weight:700;}
  .wb-card-phonetic{font-size:13px;color:var(--text-secondary);margin-left:8px;}
  .wb-card-meaning{font-size:13px;color:var(--orange);margin-top:2px;}
  .wb-card-source{font-size:11px;color:var(--text-secondary);margin-top:4px;}
  .wb-card-srs{font-size:11px;margin-top:4px;padding:2px 8px;border-radius:6px;display:inline-block;}
  .wb-card-srs.due{background:rgba(247,65,95,.08);color:var(--red);}
  .wb-card-srs.ok{background:rgba(0,185,154,.08);color:var(--green);}
  .wb-remove{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:4px;border-radius:6px;flex-shrink:0;}
  .wb-remove:hover{color:var(--red);background:rgba(247,65,95,.06);}
  .wb-remove svg{width:16px;height:16px;}
  .wb-add-form{display:flex;gap:8px;margin-bottom:16px;}
  .wb-add-input{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
  .wb-add-input::placeholder{color:var(--text-secondary);}
  .wb-add-input:focus{border-color:var(--accent);}
  .wb-add-btn{padding:10px 18px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .wb-add-btn:hover{background:var(--accent-hover);}

  /* Review mode */
  .review-banner{background:var(--accent-light);border:1px solid rgba(0,184,184,.2);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s;}
  .review-banner:hover{border-color:var(--accent);}
  .review-banner-text{font-size:14px;font-weight:600;color:var(--accent);}
  .review-banner-count{font-size:24px;font-weight:800;color:var(--accent);}
  .review-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:center;}
  .review-word{font-size:28px;font-weight:800;margin-bottom:4px;}
  .review-phonetic{font-size:16px;color:var(--text-secondary);margin-bottom:16px;}
  .review-reveal{padding:10px 24px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;cursor:pointer;transition:all .15s;}
  .review-reveal:hover{border-color:var(--accent);color:var(--accent);}
  .review-meaning{font-size:18px;color:var(--orange);font-weight:600;margin:16px 0;}
  .review-btns{display:flex;gap:8px;justify-content:center;margin-top:16px;}
  .review-btn{flex:1;max-width:120px;padding:10px 0;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
  .review-btn.again{background:rgba(247,65,95,.1);color:var(--red);}
  .review-btn.hard{background:rgba(255,151,40,.1);color:var(--orange);}
  .review-btn.good{background:rgba(0,185,154,.1);color:var(--green);}
  .review-btn.easy{background:var(--accent-light);color:var(--accent);}
  .review-btn:hover{opacity:.85;}
  .review-progress{font-size:13px;color:var(--text-secondary);margin-bottom:16px;}

  /* Speed */
  .controls-bar{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 0;padding:10px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);}
  .controls-bar label{font-size:13px;color:var(--text-secondary);}
  .controls-bar .sep{width:1px;height:20px;background:var(--border);margin:0 4px;}
  .voice-btn{padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .15s;}
  .voice-btn:hover{border-color:var(--accent);color:var(--accent);}
  .voice-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600;}
  .speed-control{display:flex;align-items:center;gap:8px;justify-content:center;margin:16px 0 0;padding:10px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);}
  .speed-control label{font-size:13px;color:var(--text-secondary);}
  .speed-btn{padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;transition:all .15s;}
  .speed-btn:hover{border-color:var(--accent);color:var(--accent);}
  .speed-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600;}

  .highlight{background:var(--accent-light);border-color:var(--accent)!important;}
  .no-speech-banner{display:none;background:rgba(247,65,95,.06);border:1px solid rgba(247,65,95,.2);border-radius:var(--radius);padding:12px 16px;margin-top:12px;font-size:13px;color:var(--red);text-align:center;}
  .no-speech-banner.visible{display:block;}
  .loading{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:14px;}

  /* Auth page */
  .auth-box{max-width:360px;margin:60px auto;padding:32px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);text-align:center;}
  .auth-box h2{font-size:20px;margin-bottom:4px;}
  .auth-box .sub{font-size:13px;color:var(--text-secondary);margin-bottom:20px;}
  .auth-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;margin-bottom:10px;transition:border-color .2s;}
  .auth-input:focus{border-color:var(--accent);}
  .auth-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px;}
  .auth-btn:hover{background:var(--accent-hover);}
  .auth-toggle{font-size:13px;color:var(--accent);cursor:pointer;margin-top:14px;display:inline-block;}
  .auth-toggle:hover{text-decoration:underline;}
  .auth-error{font-size:13px;color:var(--red);margin-top:8px;min-height:18px;}
  .auth-user-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:13px;color:var(--text-secondary);}
  .auth-user-bar .name{font-weight:600;color:var(--text);}
  .auth-user-bar .logout{color:var(--red);cursor:pointer;border:none;background:none;font-size:12px;}
  .auth-user-bar .logout:hover{text-decoration:underline;}

  /* Score badge on cards */
  .card-score{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:2px 8px;border-radius:8px;margin-left:8px;}
  .card-score.s-excellent{background:rgba(0,185,154,.1);color:var(--green);}
  .card-score.s-good{background:var(--accent-light);color:var(--accent);}
  .card-score.s-fair{background:rgba(255,151,40,.08);color:var(--orange);}
  .card-score.s-poor{background:rgba(247,65,95,.06);color:var(--red);}
  /* Reading */
  .read-input{width:100%;min-height:120px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;line-height:1.7;resize:vertical;outline:none;font-family:inherit;}
  .read-input:focus{border-color:var(--accent);}
  .read-input::placeholder{color:var(--text-secondary);}
  .read-start{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:all .15s;}
  .read-start:hover{background:var(--accent-hover);}
  .read-body{line-height:2;font-size:16px;}
  .read-body .w{cursor:pointer;border-radius:4px;padding:1px 2px;transition:background .1s;-webkit-tap-highlight-color:transparent;}
  .read-body .w:hover{background:var(--accent-light);}
  .read-body .w.active{background:var(--accent);color:#fff;border-radius:4px;}
  .read-body .w.saved{border-bottom:2px solid var(--orange);}
  .read-body p{margin-bottom:12px;}
  .read-import{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;}
  .read-option{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s;}
  .read-option:hover{border-color:var(--accent);}
  .read-option svg{width:32px;height:32px;color:var(--accent);margin-bottom:8px;}
  .read-option h3{font-size:15px;margin-bottom:4px;}
  .read-option p{font-size:13px;color:var(--text-secondary);margin:0;}
  .read-option input[type=file]{display:none;}
  /* Book reader */
  .reader-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--surface);z-index:150;display:none;flex-direction:column;}
  .reader-wrap.visible{display:flex;}
  .reader-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);min-height:44px;padding-top:env(safe-area-inset-top,10px);}
  .reader-top .title{font-size:14px;font-weight:600;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 8px;}
  .reader-top .chapter-label{font-size:11px;color:var(--text-secondary);text-align:center;margin-top:2px;}
  .reader-top button{background:none;border:none;color:var(--accent);font-size:13px;cursor:pointer;padding:4px 8px;white-space:nowrap;}
  .reader-viewport{flex:1;overflow:hidden;position:relative;-webkit-tap-highlight-color:transparent;touch-action:pan-y;}
  .reader-columns{height:100%;padding:20px 24px;column-gap:48px;column-fill:auto;overflow:hidden;transition:transform .3s cubic-bezier(.25,.1,.25,1);}
  .reader-columns p{margin-bottom:14px;text-indent:0;orphans:2;widows:2;line-height:1.9;font-size:17px;color:var(--text);}
  .reader-columns .w{cursor:pointer;border-radius:3px;padding:0 1px;transition:background .1s;-webkit-tap-highlight-color:transparent;}
  .reader-columns .w:hover{background:var(--accent-light);}
  .reader-columns .w.active{background:var(--accent);color:#fff;}
  .reader-columns .w.saved{border-bottom:2px solid var(--orange);}
  .reader-bottom{display:flex;align-items:center;gap:12px;padding:8px 16px 8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));border-top:1px solid var(--border);}
  .reader-progress{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .reader-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
  .reader-page-label{font-size:12px;color:var(--text-secondary);white-space:nowrap;}
  .reader-toc{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:160;display:none;}
  .reader-toc.visible{display:block;}

  /* ── Mobile ── */

<script>
// ══════ CONFIG ══════
const DATA_BASE = './data';
const STORE_CHECKINS = 'ep_checkins';
const STORE_WORDBOOK = 'ep_wordbook';
const STORE_THEME = 'ep_theme';
const STORE_VOICE = 'ep_voice';
const VOICES = { female: 'en-US-JennyNeural', male: 'en-US-GuyNeural' };
// Azure pronunciation proxy URL — set after deploying Cloudflare Worker
const AZURE_PROXY = localStorage.getItem('ep_azure_proxy') || 'https://speech.marswang.ac.cn';

// ══════ AUTH STATE ══════
let authToken = localStorage.getItem('ep_token') || '';
let authName = localStorage.getItem('ep_name') || '';
let authMode = 'login'; // 'login' | 'register'
let userScores = {}; // key(sentence/word) -> { pct, accuracy, fluency, completeness, overall, date }

// ══════ STATE ══════
let dataIndex = null, lessonCache = {};
let currentTheme = localStorage.getItem(STORE_THEME) || 'growth';
let currentVoice = localStorage.getItem(STORE_VOICE) || 'female';
let currentRate = 0.85, currentUtterance = null, currentBtn = null;
let activeRecognition = null, activeRecBtn = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const hasSR = !!SR;

// ══════ AUTH FUNCTIONS ══════
function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-title').textContent = authMode === 'login' ? 'Sign In' : 'Register';
  document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Sign In' : 'Register';
  document.getElementById('auth-toggle').textContent = authMode === 'login' ? 'No account? Register' : 'Have an account? Sign In';
  document.getElementById('auth-invite').style.display = authMode === 'register' ? 'block' : 'none';
  document.getElementById('auth-error').textContent = '';
}
async function handleAuth() {
  const name = document.getElementById('auth-name').value.trim();
  const pin = document.getElementById('auth-pin').value.trim();
  const errEl = document.getElementById('auth-error');
  if (!name) { errEl.textContent = 'Enter your name'; return; }
  if (!pin || pin.length < 4) { errEl.textContent = '4-digit PIN required'; return; }
  errEl.textContent = '';
  document.getElementById('auth-btn').textContent = 'Loading...';
  try {
    const resp = await fetch(AZURE_PROXY + '/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: authMode === 'login' ? 'login' : 'register', name, pin, invite: (document.getElementById('auth-invite').value || '').trim() }),
    });
    const result = await resp.json();
    if (!resp.ok) { errEl.textContent = result.error || 'Failed'; document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Sign In' : 'Register'; return; }
    authToken = result.token; authName = result.name || name;
    localStorage.setItem('ep_token', authToken);
    localStorage.setItem('ep_name', authName);
    // Load cloud data if login
    if (result.data) {
      applyCloudData(result.data);
    }
    showLoggedIn();
  } catch (e) {
    errEl.textContent = 'Network error';
    document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Sign In' : 'Register';
  }
}
function logout() {
  authToken = ''; authName = '';
  localStorage.removeItem('ep_token');
  localStorage.removeItem('ep_name');
  userScores = {};
  document.getElementById('user-bar').style.display = 'none';
  navigate('auth');
}
function showLoggedIn() {
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('user-display-name').textContent = authName;
  document.getElementById('page-auth').classList.remove('active');
  navigateToday();
}
function applyCloudData(data) {
  if (data.checkins) localStorage.setItem(STORE_CHECKINS, JSON.stringify(data.checkins));
  if (data.wordbook) localStorage.setItem(STORE_WORDBOOK, JSON.stringify(data.wordbook));
  if (data.scores) userScores = data.scores;
  if (data.theme) { currentTheme = data.theme; localStorage.setItem(STORE_THEME, data.theme); }
  if (data.voice) { currentVoice = data.voice; localStorage.setItem(STORE_VOICE, data.voice); }
}
async function syncToCloud() {
  if (!authToken) return;
  try {
    await fetch(AZURE_PROXY + '/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ data: { checkins: getCheckins(), wordbook: getWordbook(), scores: userScores, theme: currentTheme, voice: currentVoice } }),
    });
  } catch {}
}
async function saveScoreToCloud(key, score) {
  userScores[key.substring(0, 80)] = score;
  if (!authToken) return;
  try {
    await fetch(AZURE_PROXY + '/score', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken },
      body: JSON.stringify({ key, score }),
    });
  } catch {}
}
function getScoreFor(key) {
  return userScores[key.substring(0, 80)] || null;
}
function scoreBadgeHtml(key) {
  const s = getScoreFor(key);
  if (!s) return '';
  const pct = s.overall || s.pct || 0;
  const cls = pct >= 90 ? 's-excellent' : pct >= 70 ? 's-good' : pct >= 50 ? 's-fair' : 's-poor';
  return `<span class="card-score ${cls}">${pct}%</span>`;
}

// ══════ SRS intervals (days) ══════
const SRS_INTERVALS = [0, 1, 3, 7, 14, 30, 60];

function getSrsData(word) {
  const wb = getWordbook();
  const w = wb.find(x => x.word.toLowerCase() === word.toLowerCase());
  if (!w) return null;
  return w.srs || { level: 0, nextReview: todayStr(), reviewCount: 0 };
}
function updateSrs(word, quality) {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  const wb = getWordbook();
  const w = wb.find(x => x.word.toLowerCase() === word.toLowerCase());
  if (!w) return;
  const srs = w.srs || { level: 0, nextReview: todayStr(), reviewCount: 0 };
  if (quality === 0) { srs.level = 0; }
  else if (quality === 1) { /* stay same */ }
  else if (quality === 2) { srs.level = Math.min(srs.level + 1, SRS_INTERVALS.length - 1); }
  else if (quality === 3) { srs.level = Math.min(srs.level + 2, SRS_INTERVALS.length - 1); }
  const days = SRS_INTERVALS[srs.level];
  const next = new Date(); next.setDate(next.getDate() + days);
  srs.nextReview = fmtDate(next);
  srs.reviewCount = (srs.reviewCount || 0) + 1;
  w.srs = srs;
  saveWordbook(wb);
}
function getDueWords() {
  const today = todayStr();
  return getWordbook().filter(w => {
    const nr = (w.srs && w.srs.nextReview) ? w.srs.nextReview : today;
    return nr <= today;
  });
}

// ══════ DATA ══════
async function loadIndex() { if (dataIndex) return dataIndex; const r = await fetch(DATA_BASE+'/index.json?t='+Date.now()); dataIndex = await r.json(); return dataIndex; }
async function loadLesson(d) { if (lessonCache[d]) return lessonCache[d]; const r = await fetch(DATA_BASE+'/'+d+'.json?t='+Date.now()); if (!r.ok) return null; const data = await r.json(); lessonCache[d]=data; return data; }

// ══════ STORAGE ══════
function getCheckins(){try{return JSON.parse(localStorage.getItem(STORE_CHECKINS))||{};}catch{return {};}}
function addCheckin(d){const a=getCheckins();const t=a[d]||[];const n=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});if(t[t.length-1]!==n)t.push(n);a[d]=t;localStorage.setItem(STORE_CHECKINS,JSON.stringify(a));}
function getStreak(){const c=getCheckins();const t=new Date();let s=0;for(let i=0;i<365;i++){const d=new Date(t);d.setDate(d.getDate()-i);if(c[fmtDate(d)])s++;else if(i>0)break;}return s;}
function getWordbook(){try{return JSON.parse(localStorage.getItem(STORE_WORDBOOK))||[];}catch{return[];}}
function saveWordbook(wb){localStorage.setItem(STORE_WORDBOOK,JSON.stringify(wb));}
function isInWordbook(w){return getWordbook().some(x=>x.word.toLowerCase()===w.toLowerCase());}
function addToWordbook(w,ph,m,src){const wb=getWordbook();if(wb.some(x=>x.word.toLowerCase()===w.toLowerCase()))return;wb.push({word:w,phonetic:ph,meaning:m,source:src,addedAt:new Date().toISOString(),srs:{level:0,nextReview:todayStr(),reviewCount:0}});saveWordbook(wb);updateWbBadge();syncToCloud();}
function removeFromWordbook(w){saveWordbook(getWordbook().filter(x=>x.word.toLowerCase()!==w.toLowerCase()));updateWbBadge();syncToCloud();}

function todayStr(){return fmtDate(new Date());}

// ══════ TTS (Azure Neural Voice with fallback) ══════
let ttsAudio = null;
function speak(text, btn) {
  // Stop any current playback
  if (ttsAudio) { ttsAudio.pause(); ttsAudio = null; }
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  if (currentBtn) {
    currentBtn.classList.remove('playing');
    currentBtn.closest('.card,.vocab-card,.review-card')?.classList.remove('highlight');
  }
  if (currentBtn === btn) { currentBtn = null; currentUtterance = null; return; }

  currentBtn = btn;
  btn.classList.add('playing');
  btn.closest('.card,.vocab-card,.review-card')?.classList.add('highlight');

  const done = () => {
    btn.classList.remove('playing');
    btn.closest('.card,.vocab-card,.review-card')?.classList.remove('highlight');
    currentBtn = null; currentUtterance = null; ttsAudio = null;
  };

  if (AZURE_PROXY) {
    // Azure Neural TTS
    fetch(AZURE_PROXY + '/tts', {
      method: 'POST',
      headers: { 'X-TTS-Text': text, 'X-TTS-Rate': String(currentRate), 'X-TTS-Voice': VOICES[currentVoice] || VOICES.female },
    }).then(r => {
      if (!r.ok) throw new Error('TTS failed');
      return r.blob();
    }).then(blob => {
      const url = URL.createObjectURL(blob);
      ttsAudio = new Audio(url);
      ttsAudio.onended = () => { URL.revokeObjectURL(url); done(); };
      ttsAudio.onerror = () => { URL.revokeObjectURL(url); done(); };
      ttsAudio.play();
    }).catch(() => {
      // Fallback to browser TTS
      speakFallback(text, btn, done);
    });
  } else {
    speakFallback(text, btn, done);
  }
}
function speakFallback(text, btn, done) {
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = currentRate;
  const v = speechSynthesis.getVoices();
  const p = v.find(x=>x.name.includes('Samantha')) || v.find(x=>x.lang==='en-US'&&x.localService) || v.find(x=>x.lang.startsWith('en'));
  if (p) u.voice = p;
  currentUtterance = u;
  u.onend = u.onerror = done;
  speechSynthesis.speak(u);
}

// ══════ SPEECH RECOGNITION + SCORING ══════
function normalize(t){return t.toLowerCase().replace(/['']/g,"'").replace(/let's/g,'lets').replace(/[^\w\s']/g,'').trim().split(/\s+/);}
function lev(a,b){const m=a.length,n=b.length,d=Array.from({length:m+1},()=>new Array(n+1).fill(0));for(let i=0;i<=m;i++)d[i][0]=i;for(let j=0;j<=n;j++)d[0][j]=j;for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=a[i-1]===b[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j],d[i][j-1],d[i-1][j-1]);return d[m][n];}
function scoreMatch(ref,spoken){const rw=normalize(ref),sw=normalize(spoken),used=new Array(sw.length).fill(false),res=[];let m=0;for(const r of rw){let f=false;for(let i=0;i<sw.length;i++){if(!used[i]&&sw[i]===r){used[i]=true;f=true;break;}}if(!f)for(let i=0;i<sw.length;i++){if(!used[i]&&r.length>3&&lev(sw[i],r)<=1){used[i]=true;f=true;break;}}res.push({word:r,matched:f});if(f)m++;}return{results:res,pct:Math.round(m/rw.length*100),matched:m,total:rw.length,spoken};}

function renderScore(card, result, azureResult) {
  const el=card.querySelector('.score-result');
  let g,gc;if(result.pct>=90){g='Excellent';gc='excellent';}else if(result.pct>=70){g='Good';gc='good';}else if(result.pct>=50){g='Fair';gc='fair';}else{g='Keep Trying';gc='poor';}
  let h=`<div class="score-header"><span class="score-badge ${gc}">${result.pct}%</span><span class="score-label">${g} (${result.matched}/${result.total})</span></div><div class="score-words">${result.results.map(x=>`<span class="${x.matched?'matched':'missed'}">${x.word}</span>`).join(' ')}</div><div class="score-your-text">${escHtml(result.spoken)}</div>`;

  // Azure detailed scores
  if (azureResult && azureResult.NBest && azureResult.NBest[0]) {
    const nb = azureResult.NBest[0];
    const pa = nb.PronunciationAssessment;
    if (pa) {
      const colorFor = s => s >= 80 ? 'var(--green)' : s >= 60 ? 'var(--orange)' : 'var(--red)';
      h += `<div class="az-score">
        <div class="az-score-item"><div class="num" style="color:${colorFor(pa.AccuracyScore)}">${Math.round(pa.AccuracyScore)}</div><div class="lbl">Accuracy</div></div>
        <div class="az-score-item"><div class="num" style="color:${colorFor(pa.FluencyScore)}">${Math.round(pa.FluencyScore)}</div><div class="lbl">Fluency</div></div>
        <div class="az-score-item"><div class="num" style="color:${colorFor(pa.CompletenessScore)}">${Math.round(pa.CompletenessScore)}</div><div class="lbl">Completeness</div></div>
        <div class="az-score-item"><div class="num" style="color:${colorFor(pa.PronScore)}">${Math.round(pa.PronScore)}</div><div class="lbl">Overall</div></div>
      </div>`;
      if (nb.Words) {
        h += '<div class="az-word-scores">';
        nb.Words.forEach(w => {
          const s = w.PronunciationAssessment?.AccuracyScore ?? 0;
          const cls = s >= 80 ? 'good' : s >= 60 ? 'fair' : 'poor';
          h += `<span class="az-word ${cls}">${escHtml(w.Word)} ${Math.round(s)}</span>`;
        });
        h += '</div>';
      }
    }
  }
  el.innerHTML=h;el.classList.add('visible');

  // Save score
  const ref = card.dataset.text;
  const scoreObj = { pct: result.pct };
  if (azureResult && azureResult.NBest && azureResult.NBest[0]?.PronunciationAssessment) {
    const pa = azureResult.NBest[0].PronunciationAssessment;
    scoreObj.accuracy = Math.round(pa.AccuracyScore);
    scoreObj.fluency = Math.round(pa.FluencyScore);
    scoreObj.completeness = Math.round(pa.CompletenessScore);
    scoreObj.overall = Math.round(pa.PronScore);
  }
  saveScoreToCloud(ref, scoreObj);
  // Update badge in card header
  const numEl = card.querySelector('.card-num');
  if (numEl) {
    const oldBadge = numEl.querySelector('.card-score');
    if (oldBadge) oldBadge.remove();
    numEl.insertAdjacentHTML('beforeend', scoreBadgeHtml(ref));
  }
}

// ══════ RECORDING (Web Speech + optional Azure) ══════
let mediaRecorder = null;
let audioChunks = [];

function toggleRecord(btn){
  if(!SR)return;
  const card=btn.closest('.card'),hint=card.querySelector('.rec-hint'),ref=card.dataset.text;
  if(speechSynthesis.speaking){speechSynthesis.cancel();if(currentBtn){currentBtn.classList.remove('playing');currentBtn.closest('.card,.vocab-card')?.classList.remove('highlight');}}
  if(activeRecognition&&activeRecBtn===btn){activeRecognition.stop();if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();return;}
  if(activeRecognition)activeRecognition.stop();

  const rec=new SR();rec.lang='en-US';rec.interimResults=false;rec.maxAlternatives=1;rec.continuous=false;
  activeRecognition=rec;activeRecBtn=btn;btn.classList.add('recording');hint.classList.add('visible');
  card.querySelector('.score-result').classList.remove('visible');

  // Start audio recording for Azure (if configured)
  let azurePromise = null;
  if (AZURE_PROXY) {
    navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } }).then(stream => {
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => { stream.getTracks().forEach(t => t.stop()); };
      mediaRecorder.start();
    }).catch(() => {});
  }

  rec.onresult=e=>{
    const spoken = e.results[0][0].transcript;
    const result = scoreMatch(ref, spoken);

    if (AZURE_PROXY && mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
      // Wait for audio data, then send to Azure
      setTimeout(async () => {
        if (audioChunks.length) {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          try {
            const resp = await fetch(AZURE_PROXY + '/assess', {
              method: 'POST',
              headers: { 'X-Reference-Text': ref },
              body: blob,
            });
            const azResult = await resp.json();
            renderScore(card, result, azResult);
          } catch { renderScore(card, result, null); }
        } else { renderScore(card, result, null); }
      }, 300);
    } else {
      renderScore(card, result, null);
    }
  };
  rec.onerror=e=>{if(e.error!=='no-speech'&&e.error!=='aborted'){const el=card.querySelector('.score-result');el.innerHTML=`<div style="color:var(--red);font-size:13px">Error: ${e.error}</div>`;el.classList.add('visible');}};
  rec.onend=()=>{btn.classList.remove('recording');hint.classList.remove('visible');if(activeRecBtn===btn){activeRecognition=null;activeRecBtn=null;}if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();};
  rec.start();
}

// ══════ READING ══════
const STORE_READING = 'ep_reading_text';
const STORE_BOOK = 'ep_book';
const STORE_CHAPTER = 'ep_chapter';
const dictCache = {};
let bookChapters = []; // [{title, text}]
let currentChapter = 0;

async function renderReading() {
  const el = document.getElementById('reading-content');

  // If currently reading a book from localStorage cache
  const savedBook = localStorage.getItem(STORE_BOOK);
  if (savedBook) {
    try {
      const book = JSON.parse(savedBook);
      bookChapters = book.chapters;
      currentChapter = parseInt(localStorage.getItem(STORE_CHAPTER) || '0');
      renderBookChapter(book.title);
      return;
    } catch {}
  }

  const savedText = localStorage.getItem(STORE_READING);
  if (savedText) { renderReadingBody(savedText); return; }

  // Show bookshelf + import options
  el.innerHTML = '<div class="loading">Loading bookshelf...</div>';

  let books = [];
  let remaining = 50;
  if (authToken) {
    try {
      const resp = await fetch(AZURE_PROXY + '/books', { headers: { 'Authorization': 'Bearer ' + authToken } });
      if (resp.ok) {
        const r = await resp.json();
        books = r.books || [];
        remaining = Math.round((r.remaining || 0) / 1024 / 1024);
      }
    } catch {}
  }

  let h = '';
  // Import buttons
  h += `<div class="read-import" style="flex-direction:row;gap:8px">
    <div class="read-option" style="flex:1" onclick="document.getElementById('epub-file').click()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <h3>Upload EPUB</h3>
      <p>${remaining}MB free</p>
      <input type="file" id="epub-file" accept=".epub" onchange="handleEpubUpload(this)">
    </div>
    <div class="read-option" style="flex:1" onclick="showTextInput()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <h3>Paste Text</h3>
      <p>Article, email...</p>
    </div>
  </div>`;

  // Bookshelf
  if (books.length) {
    h += '<div class="section-title">My Books</div>';
    books.forEach(b => {
      const sizeMB = (b.size / 1024 / 1024).toFixed(1);
      const date = b.uploadedAt ? b.uploadedAt.slice(0, 10) : '';
      h += `<div class="wb-card" style="cursor:pointer" onclick="openCloudBook('${b.id}','${escJs(b.name)}')">
        <div style="width:32px;height:32px;border-radius:6px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="width:16px;height:16px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="wb-card-body">
          <div class="wb-card-word">${escHtml(b.name)}</div>
          <div class="wb-card-source">${sizeMB}MB · ${date}</div>
        </div>
        <button class="wb-remove" onclick="event.stopPropagation();deleteCloudBook('${b.id}','${escJs(b.name)}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    });
  }

  el.innerHTML = h;
}

function showTextInput() {
  const el = document.getElementById('reading-content');
  el.innerHTML = `
    <button style="margin-bottom:10px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;cursor:pointer" onclick="renderReading()">Back</button>
    <textarea class="read-input" id="read-input" placeholder="Paste any English text here..."></textarea>

function startPasteReading() {
  const text = document.getElementById('read-input').value.trim();

async function openCloudBook(bookId, bookName) {
  const el = document.getElementById('reading-content');
  el.innerHTML = '<div class="loading">Downloading book...</div>';
  try {
    const resp = await fetch(AZURE_PROXY + '/books/' + bookId, { headers: { 'Authorization': 'Bearer ' + authToken } });

async function deleteCloudBook(bookId, bookName) {

// ── EPUB parsing ──
async function handleEpubUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const el = document.getElementById('reading-content');
  el.innerHTML = '<div class="loading">Uploading & parsing EPUB...</div>';

  // Upload to cloud
  if (authToken) {
    try {
      const formData = new FormData();
      formData.append('file', file);
      const upResp = await fetch(AZURE_PROXY + '/books/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + authToken },
        body: formData,
      });
      if (!upResp.ok) {
        const err = await upResp.json();
        el.innerHTML = `<div class="loading">${escHtml(err.error || 'Upload failed')}</div>`;
        return;
      }
    } catch {}
  }

  try {
    await parseEpubBlob(file, file.name.replace('.epub', ''));
  } catch (e) {
    document.getElementById('reading-content').innerHTML = `<div class="loading">Failed to parse EPUB: ${escHtml(e.message)}</div>`;
  }
}

async function parseEpubBlob(blob, fallbackTitle) {
  const el = document.getElementById('reading-content');
  el.innerHTML = '<div class="loading">Parsing EPUB...</div>';

  const zip = await JSZip.loadAsync(blob);
  const container = await zip.file('META-INF/container.xml').async('text');
  const containerDoc = new DOMParser().parseFromString(container, 'text/xml');
  const rootPath = containerDoc.querySelector('rootfile').getAttribute('full-path');
  const rootDir = rootPath.includes('/') ? rootPath.substring(0, rootPath.lastIndexOf('/') + 1) : '';

  const opf = await zip.file(rootPath).async('text');
  const opfDoc = new DOMParser().parseFromString(opf, 'text/xml');
  const titleEl = opfDoc.querySelector('metadata title, dc\\:title');
  const bookTitle = titleEl ? titleEl.textContent : fallbackTitle;

  const manifest = {};
  opfDoc.querySelectorAll('manifest item').forEach(item => { manifest[item.getAttribute('id')] = item.getAttribute('href'); });
  const spineItems = [];
  opfDoc.querySelectorAll('spine itemref').forEach(ref => { const id = ref.getAttribute('idref'); if (manifest[id]) spineItems.push(manifest[id]); });

  const chapters = [];
  for (const href of spineItems) {
    const f = zip.file(rootDir + href);
    if (!f) continue;
    const html = await f.async('text');
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const heading = doc.querySelector('h1, h2, h3');
    const title = heading ? heading.textContent.trim().substring(0, 60) : href.replace(/.*\//, '').replace(/\.\w+$/, '');
    const body = doc.querySelector('body');
    if (!body) continue;
    const text = extractText(body);
    if (text.trim().length < 20) continue;
    chapters.push({ title, text });
  }

  if (!chapters.length) { el.innerHTML = '<div class="loading">No readable content found.</div>'; return; }

  bookChapters = chapters;
  currentChapter = 0;
  localStorage.setItem(STORE_BOOK, JSON.stringify({ title: bookTitle, chapters }));
  localStorage.setItem(STORE_CHAPTER, '0');
  localStorage.removeItem(STORE_READING);
  renderBookChapter(bookTitle);
}

function extractText(node) {
  let text = '';
  for (const child of node.childNodes) {
    if (child.nodeType === 3) {
      text += child.textContent;
    } else if (child.nodeType === 1) {
      const tag = child.tagName.toLowerCase();
      if (['script', 'style', 'svg'].includes(tag)) continue;
      if (['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'li', 'br', 'tr'].includes(tag)) {
        text += '\n';
      }
      text += extractText(child);
      if (['p', 'div', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'li', 'tr'].includes(tag)) {
        text += '\n';
      }
    }
  }
  return text;
}

// ── Book reader (Apple Books style) ──
let readerPage = 0;
let readerTotalPages = 1;
let readerPageWidth = 0;
let touchStartX = 0, touchStartY = 0, touchDeltaX = 0, isSwiping = false;
let readerBookTitle = '';

function renderBookChapter(bookTitle) {
  readerBookTitle = bookTitle;
  openBookReader();
}

function openBookReader() {
  const wrap = document.getElementById('reader-wrap');
  wrap.classList.add('visible');
  document.getElementById('reader-title').textContent = readerBookTitle;
  loadChapterContent();
  setupReaderGestures();
}

function loadChapterContent() {
  const ch = bookChapters[currentChapter];
  if (!ch) return;

  document.getElementById('reader-chapter-label').textContent = ch.title;

  // Build chapter HTML
  let h = '';
  const paragraphs = ch.text.split(/\n\s*\n|\n/);
  paragraphs.forEach(para => {
    if (!para.trim()) return;
    h += '<p>';
    const tokens = para.match(/[\w']+|[^\w\s]+|\s+/g) || [];
    tokens.forEach(tok => {
      if (/^\s+$/.test(tok)) { h += ' '; return; }
      if (/^[^\w']+$/.test(tok)) { h += tok; return; }
      const clean = tok.toLowerCase().replace(/[^a-z']/g, '');
      const saved = clean && isInWordbook(clean) ? ' saved' : '';
      h += `<span class="w${saved}" data-word="${escHtml(clean)}" onclick="lookupWord(this)">${escHtml(tok)}</span>`;
    });
    h += '</p>';
  });

  const cols = document.getElementById('reader-columns');
  cols.innerHTML = h;
  cols.style.transform = 'translateX(0)';

  // Calculate pages after render
  requestAnimationFrame(() => {
    setTimeout(() => {
      const viewport = document.getElementById('reader-viewport');
      readerPageWidth = viewport.offsetWidth;
      cols.style.columnWidth = (readerPageWidth - 48) + 'px';
      readerTotalPages = Math.max(1, Math.ceil(cols.scrollWidth / readerPageWidth));
      readerPage = 0;
      updateReaderUI();
      buildToc();
    }, 50);
  });
}

function updateReaderUI() {
  const pct = readerTotalPages > 1 ? ((readerPage + 1) / readerTotalPages * 100) : 100;
  document.getElementById('reader-progress-fill').style.width = pct + '%';
  document.getElementById('reader-page-label').textContent = `${readerPage + 1} / ${readerTotalPages}`;
}

function goReaderPage(dir) {
  const next = readerPage + dir;
  if (next < 0) {
    // Go to prev chapter
    if (currentChapter > 0) { currentChapter--; localStorage.setItem(STORE_CHAPTER, String(currentChapter)); loadChapterContent(); readerPage = 0; }
    return;
  }
  if (next >= readerTotalPages) {
    // Go to next chapter
    if (currentChapter < bookChapters.length - 1) { currentChapter++; localStorage.setItem(STORE_CHAPTER, String(currentChapter)); loadChapterContent(); }
    return;
  }
  readerPage = next;
  const cols = document.getElementById('reader-columns');
  cols.style.transition = 'transform .3s cubic-bezier(.25,.1,.25,1)';
  cols.style.transform = `translateX(-${readerPage * readerPageWidth}px)`;
  updateReaderUI();
}

function setupReaderGestures() {
  const vp = document.getElementById('reader-viewport');
  // Prevent duplicate listeners
  vp.onpointerdown = null; vp.onpointermove = null; vp.onpointerup = null;

  vp.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchDeltaX = 0;
    isSwiping = false;
    document.getElementById('reader-columns').style.transition = 'none';
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!isSwiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 10) isSwiping = true;
    if (!isSwiping) return;
    touchDeltaX = dx;
    const cols = document.getElementById('reader-columns');
    const offset = -(readerPage * readerPageWidth) + dx * 0.6;
    cols.style.transform = `translateX(${offset}px)`;
  }, { passive: true });

  vp.addEventListener('touchend', () => {
    if (isSwiping && Math.abs(touchDeltaX) > 50) {
      goReaderPage(touchDeltaX < 0 ? 1 : -1);
    } else {
      // Snap back
      const cols = document.getElementById('reader-columns');
      cols.style.transition = 'transform .3s cubic-bezier(.25,.1,.25,1)';
      cols.style.transform = `translateX(-${readerPage * readerPageWidth}px)`;
    }
    isSwiping = false;
    touchDeltaX = 0;
  }, { passive: true });

  // Click to turn page (desktop + tap without swipe)
  vp.addEventListener('click', e => {
    if (isSwiping || Math.abs(touchDeltaX) > 10) return;
    // Don't trigger on word taps
    if (e.target.classList.contains('w')) return;
    const x = e.clientX;
    const w = vp.offsetWidth;
    if (x < w * 0.3) goReaderPage(-1);
    else if (x > w * 0.7) goReaderPage(1);
  });
}

function buildToc() {
  const panel = document.getElementById('reader-toc-panel');
  let h = '<div class="reader-toc-title">Contents</div>';
  bookChapters.forEach((c, i) => {
    h += `<div class="reader-toc-item${i === currentChapter ? ' current' : ''}" onclick="goToChapter(${i});toggleToc()">${i + 1}. ${escHtml(c.title)}</div>`;
  });
  panel.innerHTML = h;
}

function toggleToc() {
  document.getElementById('reader-toc').classList.toggle('visible');
}

function closeBookReader() {
  document.getElementById('reader-wrap').classList.remove('visible');
  document.getElementById('reader-toc').classList.remove('visible');
}

function prevChapter() {
  if (currentChapter <= 0) return;
  currentChapter--;
  localStorage.setItem(STORE_CHAPTER, String(currentChapter));
  loadChapterContent();
}
function nextChapter() {
  if (currentChapter >= bookChapters.length - 1) return;
  currentChapter++;
  localStorage.setItem(STORE_CHAPTER, String(currentChapter));
  loadChapterContent();
}
function goToChapter(idx) {
  currentChapter = parseInt(idx);
  localStorage.setItem(STORE_CHAPTER, String(currentChapter));
  loadChapterContent();
}
function closeBook() {
  closeBookReader();
  localStorage.removeItem(STORE_BOOK);
  localStorage.removeItem(STORE_CHAPTER);
  bookChapters = [];
  renderReading();
}

function renderReadingBody(text) {
  const el = document.getElementById('reading-content');
  let h = '<button style="margin-bottom:14px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-size:13px;cursor:pointer" onclick="clearReading()">Change Text</button>';
  h += '<div class="read-body">';
  const paragraphs = text.split(/\n\s*\n|\n/);
  paragraphs.forEach((para, pi) => {
    if (!para.trim()) return;
    h += '<p>';
    const tokens = para.match(/[\w']+|[^\w\s]+|\s+/g) || [];
    tokens.forEach((tok, ti) => {
      if (/^\s+$/.test(tok)) { h += ' '; return; }
      if (/^[^\w']+$/.test(tok)) { h += tok; return; }
      const clean = tok.toLowerCase().replace(/[^a-z']/g, '');
      const saved = clean && isInWordbook(clean) ? ' saved' : '';
      h += `<span class="w${saved}" data-word="${escHtml(clean)}" onclick="lookupWord(this)">${escHtml(tok)}</span>`;
    });
    h += '</p>';
  });
  h += '</div>';
  el.innerHTML = h;
}

function clearReading() {
  localStorage.removeItem(STORE_READING);
  renderReading();
}

function getSentenceContext(el) {
  // Get the paragraph text and find the sentence containing this word
  const p = el.closest('p');
  if (!p) return el.dataset.word;
  const text = p.textContent;
  // Simple sentence split
  const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  const word = el.dataset.word;
  for (const s of sentences) {
    if (s.toLowerCase().includes(word)) return s.trim();
  }
  return text.substring(0, 120);
}

async function lookupWord(el) {
  const word = el.dataset.word;
  if (!word || word.length < 2) return;

  // Highlight active word
  document.querySelectorAll('.read-body .w.active').forEach(w => w.classList.remove('active'));
  el.classList.add('active');

  const popup = document.getElementById('word-popup');
  const overlay = document.getElementById('word-popup-overlay');
  const ctx = getSentenceContext(el);

  // Show loading
  popup.style.display = 'block';
  overlay.classList.add('visible');
  popup.innerHTML = '<div class="word-popup-loading">Looking up...</div>';

  // Fetch dictionary
  let data = dictCache[word];
  if (!data) {
    try {
      const resp = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (resp.ok) { data = await resp.json(); dictCache[word] = data; }
    } catch {}
  }

  const saved = isInWordbook(word);
  let phonetic = '';
  let meanings = [];

  if (data && data[0]) {
    phonetic = data[0].phonetic || (data[0].phonetics && data[0].phonetics.find(p => p.text)?.text) || '';
    meanings = (data[0].meanings || []).slice(0, 3);
  }

  // Highlight word in context
  const ctxHtml = ctx.replace(new RegExp(`\\b${word}\\b`, 'gi'), m => `<mark>${m}</mark>`);

  let h = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap"><span class="word-popup-word">${escHtml(word)}</span>`;
  if (phonetic) h += `<span class="word-popup-phonetic">${escHtml(phonetic)}</span>`;
  h += '</div>';

  if (meanings.length) {
    meanings.forEach(m => {
      h += `<div style="margin-bottom:8px"><span class="word-popup-pos">${escHtml(m.partOfSpeech)}</span>`;
      const defs = (m.definitions || []).slice(0, 2);
      defs.forEach(d => { h += `<div class="word-popup-def">${escHtml(d.definition)}</div>`; });
      h += '</div>';
    });
  } else {
    h += '<div class="word-popup-def" style="color:var(--text-secondary)">No dictionary entry found</div>';
  }

  h += `<div class="word-popup-ctx">${ctxHtml}</div>`;
  h += `<div class="word-popup-actions">`;
  h += `<button class="play" onclick="speak('${escJs(word)}',this)">Play</button>`;
  h += `<button class="${saved?'save saved':'save'}" id="popup-save-btn" onclick="togglePopupSave('${escJs(word)}','${escJs(phonetic)}')">${saved?'Saved':'Save to Wordbook'}</button>`;
  h += '</div>';

  popup.innerHTML = h;
}

function togglePopupSave(word, phonetic) {
  const btn = document.getElementById('popup-save-btn');
  if (isInWordbook(word)) {
    removeFromWordbook(word);
    btn.textContent = 'Save to Wordbook';
    btn.classList.remove('saved');
  } else {
    addToWordbook(word, phonetic, '', 'reading');
    btn.textContent = 'Saved';
    btn.classList.add('saved');
  }
  // Update word highlight in reading body
  document.querySelectorAll(`.read-body .w[data-word="${word}"]`).forEach(w => {
    w.classList.toggle('saved', isInWordbook(word));
  });
}

function closeWordPopup() {
  document.getElementById('word-popup').style.display = 'none';
  document.getElementById('word-popup-overlay').classList.remove('visible');
  document.querySelectorAll('.read-body .w.active').forEach(w => w.classList.remove('active'));
}
